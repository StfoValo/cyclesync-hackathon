<header class="mb-6 md:mb-8 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
    <div>
        <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight mb-1 md:mb-2"><span data-i18n="tel-title"><span data-i18n="tel-title">Live Fleet Telemetry</span></span></h2>
        <p class="text-sm md:text-base text-slate-400"><span data-i18n="tel-subtitle"><span data-i18n="tel-subtitle">Real-time geographical tracking and fleet metrics.</span></span></p>
    </div>
    <div class="flex bg-slate-800/80 backdrop-blur-sm rounded-lg p-1 border border-white/10 w-full md:w-auto">
        <button id="btn-view-fleet"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium bg-brand-600 text-white shadow-lg transition-all whitespace-nowrap"><span data-i18n="tel-btn-live"><span data-i18n="tel-btn-live">Live

        <button id="btn-view-suppliers"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium text-slate-400 hover:text-white transition-all whitespace-nowrap"><span data-i18n="tel-btn-network"><span data-i18n="tel-btn-network">Conventioned
            Network</span></span></button>
    </div>
</header>

<div class="grid grid-cols-1 gap-4 md:gap-6">
    <div
        class="glass-panel rounded-xl md:rounded-2xl p-2 md:p-6 h-[400px] md:h-[600px] flex items-center justify-center border border-white/5 overflow-hidden">
        <iframe id="map-frame" style="width: 100%; height: 100%; border: none; border-radius: 8px;"></iframe>
    </div>
</div>
