<header class="mb-6 md:mb-8 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
    <div>
        <h2 class="text-2xl md:text-3xl font-bold text-white tracking-tight mb-1 md:mb-2"><span data-i18n="tel-title">Fleet Management</span></h2>
        <p class="text-sm md:text-base text-slate-400"><span data-i18n="tel-subtitle">Vehicle registry, live telemetry, and fleet monitoring.</span></p>
    </div>
    <div class="flex bg-slate-800/80 backdrop-blur-sm rounded-lg p-1 border border-white/10 w-full md:w-auto">
        <button id="btn-view-fleet"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium bg-brand-600 text-white shadow-lg transition-all whitespace-nowrap"><span data-i18n="tel-btn-live">Live Map</span></button>
        <button id="btn-view-registry"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium text-slate-400 hover:text-white transition-all whitespace-nowrap"><span>Registry</span></button>
        <button id="btn-view-suppliers"
            class="flex-1 md:flex-none px-3 md:px-5 py-2 md:py-2.5 rounded-md text-xs md:text-sm font-medium text-slate-400 hover:text-white transition-all whitespace-nowrap"><span data-i18n="tel-btn-network">Network</span></button>
    </div>
</header>

<!-- ── Vehicle Search Bar ──────────────────────────────────────────────── -->
<div class="glass-panel rounded-xl p-4 md:p-5 border border-white/5 shadow-lg mb-6 relative">
    <div class="flex flex-col md:flex-row gap-3">
        <div class="flex-1 relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
            </div>
            <input id="vehicle-search-input" type="text" placeholder="Search by plate, VIN, driver name, or model..."
                class="w-full bg-slate-900 border border-slate-700 rounded-lg pl-12 pr-4 py-3 text-white placeholder-slate-500 focus:outline-none focus:border-brand-500 focus:ring-1 focus:ring-brand-500 transition-all text-sm md:text-base"
                autocomplete="off">
            <!-- Autocomplete dropdown -->
            <div id="vehicle-search-dropdown" class="hidden absolute top-full left-0 right-0 mt-1 bg-slate-900 border border-slate-700 rounded-lg shadow-2xl z-50 max-h-64 overflow-y-auto"></div>
        </div>
        <button id="btn-search-vehicle"
            class="bg-brand-600 hover:bg-brand-500 text-white px-6 md:px-8 py-3 rounded-lg font-bold transition-colors shadow-[0_0_15px_rgba(0,229,255,0.3)] flex items-center justify-center gap-2 shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
            </svg>
            <span>Inspect</span>
        </button>
        <button id="btn-register-vehicle"
            class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-3 rounded-lg font-bold transition-colors flex items-center justify-center gap-2 shrink-0">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
            <span>Register</span>
        </button>
    </div>
</div>

<!-- ── Filter Bar (visible in Registry mode) ──────────────────────────── -->
<div id="registry-filters" class="hidden glass-panel rounded-xl p-4 border border-white/5 mb-6">
    <div class="flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-[140px]">
            <label class="text-xs text-slate-400 mb-1 block">Manufacturer</label>
            <select id="filter-manufacturer" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                <option value="">All Brands</option>
            </select>
        </div>
        <div class="flex-1 min-w-[140px]">
            <label class="text-xs text-slate-400 mb-1 block">Model</label>
            <select id="filter-model" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" disabled>
                <option value="">All Models</option>
            </select>
        </div>
        <div class="flex-1 min-w-[120px]">
            <label class="text-xs text-slate-400 mb-1 block">Engine</label>
            <select id="filter-powertrain" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                <option value="">All Types</option>
            </select>
        </div>
        <div class="flex-1 min-w-[120px]">
            <label class="text-xs text-slate-400 mb-1 block">Region</label>
            <select id="filter-region" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                <option value="">All Regions</option>
            </select>
        </div>
        <div class="flex-1 min-w-[120px]">
            <label class="text-xs text-slate-400 mb-1 block">Body Type</label>
            <select id="filter-bodytype" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                <option value="">All</option>
            </select>
        </div>
        <div class="flex-1 min-w-[120px]">
            <label class="text-xs text-slate-400 mb-1 block">Insurance</label>
            <select id="filter-policy" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                <option value="">All</option>
                <option value="active">Active</option>
                <option value="expired">Expired</option>
            </select>
        </div>
        <div class="flex-1 min-w-[120px]">
            <label class="text-xs text-slate-400 mb-1 block">Blackbox</label>
            <select id="filter-blackbox" class="w-full bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                <option value="">All</option>
                <option value="1">With Blackbox</option>
                <option value="0">Without</option>
            </select>
        </div>
        <button id="btn-clear-filters" class="text-xs text-slate-400 hover:text-white transition-colors px-3 py-2 rounded-lg hover:bg-white/5 shrink-0">Clear</button>
    </div>
</div>

<!-- ── Vehicle Digital Passport (hidden by default, shown on search) ── -->
<div id="vehicle-passport-panel" class="hidden mb-6 fade-in">
    <!-- Back button -->
    <button id="btn-close-passport" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors mb-4 text-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        <span>Back to Fleet</span>
    </button>
    <!-- Identity Header -->
    <div class="glass-panel rounded-t-xl p-5 md:p-6 border border-white/5 border-b-0 bg-gradient-to-r from-slate-900 via-slate-800 to-slate-900">
        <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="w-14 h-14 rounded-xl bg-gradient-to-br from-brand-600 to-purple-600 flex items-center justify-center shadow-lg">
                    <span id="passport-icon" class="text-2xl"></span>
                </div>
                <div>
                    <h3 id="passport-model" class="text-xl md:text-2xl font-bold text-white">—</h3>
                    <div class="flex flex-wrap items-center gap-3 mt-1">
                        <span id="passport-plate" class="bg-black/40 border border-slate-700 rounded px-3 py-1 font-mono font-bold text-white text-sm tracking-wider">— — —</span>
                        <span id="passport-driver" class="text-slate-400 text-sm">—</span>
                        <span id="passport-powertrain" class="text-xs px-2 py-0.5 rounded-full bg-brand-500/20 text-brand-400 border border-brand-500/30 font-medium">—</span>
                        <span id="passport-blackbox" class="text-xs px-2 py-0.5 rounded-full font-medium hidden">Blackbox</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <div id="passport-vsi-container" class="text-center">
                    <div id="passport-vsi" class="text-3xl font-black">—</div>
                    <div class="text-xs text-slate-400 uppercase tracking-wider">VSI Score</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Component Health Bar (always visible) -->
    <div class="glass-panel p-5 md:p-6 border border-white/5 border-b-0">
        <h4 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Component Health</h4>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="passport-components"></div>
    </div>

    <!-- Expandable Sections -->
    <div class="glass-panel rounded-b-xl border border-white/5 divide-y divide-white/5">
        <!-- Insurance Section -->
        <div class="accordion-section">
            <button class="accordion-trigger w-full flex items-center justify-between p-5 text-left hover:bg-white/[0.02] transition-colors" data-target="passport-insurance-content">
                <div class="flex items-center gap-3">
                    <span class="text-lg"></span>
                    <span class="font-semibold text-white text-sm">Insurance Details</span>
                    <span id="passport-insurance-badge" class="text-xs px-2 py-0.5 rounded-full bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 font-medium">—</span>
                </div>
                <svg class="w-5 h-5 text-slate-400 accordion-chevron transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="passport-insurance-content" class="hidden px-5 pb-5">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm" id="passport-insurance-grid"></div>
            </div>
        </div>

        <!-- Telemetry Section -->
        <div class="accordion-section">
            <button class="accordion-trigger w-full flex items-center justify-between p-5 text-left hover:bg-white/[0.02] transition-colors" data-target="passport-telemetry-content">
                <div class="flex items-center gap-3">
                    <span class="text-lg"></span>
                    <span class="font-semibold text-white text-sm">Live Telemetry & Sensors</span>
                </div>
                <svg class="w-5 h-5 text-slate-400 accordion-chevron transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="passport-telemetry-content" class="hidden px-5 pb-5">
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 text-sm" id="passport-telemetry-grid"></div>
            </div>
        </div>

        <!-- Maintenance History Section -->
        <div class="accordion-section">
            <button class="accordion-trigger w-full flex items-center justify-between p-5 text-left hover:bg-white/[0.02] transition-colors" data-target="passport-history-content">
                <div class="flex items-center gap-3">
                    <span class="text-lg"></span>
                    <span class="font-semibold text-white text-sm">Maintenance History</span>
                </div>
                <svg class="w-5 h-5 text-slate-400 accordion-chevron transition-transform duration-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="passport-history-content" class="hidden px-5 pb-5">
                <div id="passport-history-timeline" class="relative border-l-2 border-slate-700 ml-3 space-y-4"></div>
            </div>
        </div>
    </div>
</div>

<!-- ── Vehicle Registry Table (shown in Registry mode) ────────────────── -->
<div id="registry-view-panel" class="hidden">
    <div class="glass-panel rounded-xl border border-white/5 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-800/80 text-xs text-slate-400 uppercase tracking-wider">
                    <tr>
                        <th class="px-4 py-3 cursor-pointer hover:text-white" data-sort="plate_number">Plate ↕</th>
                        <th class="px-4 py-3 cursor-pointer hover:text-white" data-sort="model">Model ↕</th>
                        <th class="px-4 py-3 hidden md:table-cell">Driver</th>
                        <th class="px-4 py-3 hidden lg:table-cell cursor-pointer hover:text-white" data-sort="region">Region ↕</th>
                        <th class="px-4 py-3 cursor-pointer hover:text-white" data-sort="vsi_score">VSI ↕</th>
                        <th class="px-4 py-3 hidden md:table-cell">Engine</th>
                        <th class="px-4 py-3 hidden lg:table-cell">Insurance</th>
                        <th class="px-4 py-3 hidden lg:table-cell">Blackbox</th>
                        <th class="px-4 py-3 hidden xl:table-cell cursor-pointer hover:text-white" data-sort="odometer">Odometer ↕</th>
                    </tr>
                </thead>
                <tbody id="registry-table-body" class="divide-y divide-white/5">
                    <tr><td colspan="9" class="px-4 py-8 text-center text-slate-500">Loading vehicles...</td></tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <div id="registry-pagination" class="flex items-center justify-between px-4 py-3 bg-slate-800/40 border-t border-white/5">
            <span id="registry-count" class="text-xs text-slate-400">— vehicles</span>
            <div class="flex items-center gap-2">
                <button id="btn-prev-page" class="px-3 py-1.5 rounded-md bg-slate-700 text-white text-xs hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed">◀ Prev</button>
                <span id="registry-page-info" class="text-xs text-slate-400">Page 1</span>
                <button id="btn-next-page" class="px-3 py-1.5 rounded-md bg-slate-700 text-white text-xs hover:bg-slate-600 disabled:opacity-30 disabled:cursor-not-allowed">Next ▶</button>
            </div>
        </div>
    </div>
</div>

<!-- ── Fleet Map (shown in Map mode) ──────────────────────────────────── -->
<div id="map-view-panel" class="grid grid-cols-1 gap-4 md:gap-6">
    <div class="glass-panel rounded-xl md:rounded-2xl p-2 md:p-6 h-[400px] md:h-[600px] flex items-center justify-center border border-white/5 overflow-hidden">
        <iframe id="map-frame" style="width: 100%; height: 100%; border: none; border-radius: 8px;"></iframe>
    </div>
</div>

<!-- ── Register Vehicle Modal ─────────────────────────────────────────── -->
<div id="register-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-white/10 rounded-2xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex items-center justify-between p-6 border-b border-white/5">
            <h3 class="text-lg font-bold text-white">Register New Vehicle</h3>
            <button id="btn-close-register" class="text-slate-400 hover:text-white p-1"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
        </div>
        <form id="register-form" class="p-6 space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Plate Number*</label>
                    <input name="plate" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="AB 123 CD">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">VIN</label>
                    <input name="vin" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="WAUZZZ8V9NA...">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Manufacturer*</label>
                    <input name="manufacturer" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="Audi">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Model*</label>
                    <input name="model" required class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="A4 Avant">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Year</label>
                    <input name="year" type="number" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="2024">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Powertrain</label>
                    <select name="powertrain" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none">
                        <option value="petrol">Petrol</option><option value="diesel">Diesel</option><option value="electric">Electric</option>
                        <option value="hybrid">Hybrid</option><option value="plug_in_hybrid">Plug-in Hybrid</option><option value="gpl">GPL</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Driver Name</label>
                    <input name="driver_name" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="Marco Rossi">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Region</label>
                    <input name="region" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="Lombardia">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Policy Number</label>
                    <input name="policy_number" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="POL-2024-XXXXX">
                </div>
                <div>
                    <label class="text-xs text-slate-400 mb-1 block">Insurer</label>
                    <input name="insurer" class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-white text-sm focus:border-brand-500 focus:outline-none" placeholder="UnipolSai">
                </div>
            </div>
            <div class="flex justify-end gap-3 pt-4">
                <button type="button" id="btn-cancel-register" class="px-5 py-2 rounded-lg text-slate-400 hover:text-white text-sm transition-colors">Cancel</button>
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-lg font-bold text-sm transition-colors">Register Vehicle</button>
            </div>
        </form>
    </div>
</div>
